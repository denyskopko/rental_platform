version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: rental_db_dev
    restart: always
    environment:
      MYSQL_DATABASE: rental_platform
      MYSQL_USER: rental_user
      MYSQL_PASSWORD: rental_password
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rental_network_dev

  redis:
    image: redis:7-alpine
    container_name: rental_redis_dev
    ports:
      - "6379:6379"
    networks:
      - rental_network_dev

  web:
    build: ./backend
    container_name: rental_web_dev
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - media_volume_dev:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - rental_network_dev

  frontend:
    image: node:20-alpine
    container_name: rental_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    networks:
      - rental_network_dev

volumes:
  mysql_data_dev:
  media_volume_dev:

networks:
  rental_network_dev:
    driver: bridge