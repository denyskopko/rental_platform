version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: rental_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rental_network

  redis:
    image: redis:7-alpine
    container_name: rental_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rental_network

  web:
    build: ./backend
    container_name: rental_web
    restart: always
    env_file:
      - ./backend/.env.docker
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate --settings=config.settings.prod &&
             python manage.py collectstatic --no-input --settings=config.settings.prod &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    networks:
      - rental_network

  frontend:
    build: ./frontend
    container_name: rental_frontend
    restart: always
    networks:
      - rental_network

  nginx:
    image: nginx:alpine
    container_name: rental_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
      - frontend
    networks:
      - rental_network

volumes:
  mysql_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  rental_network:
    driver: bridge